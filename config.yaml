name: WiFi Thermostat Manager
version: "1.3.1"
slug: wifi_thermostat_manager
description: >-
  Add, control and monitor multiple WiFi smart thermostats from one dashboard.
  Each thermostat is published to Home Assistant as a native climate entity
  over MQTT.
url: https://github.com/pierrejochem/wifi-thermostat-manager
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false

# Web dashboard, served inside Home Assistant through Ingress (no extra port to open)
ingress: true
ingress_port: 8099
panel_icon: mdi:thermostat
panel_title: Thermostats

# Talk to the Supervisor so we can auto-discover the Mosquitto MQTT broker
hassio_api: true
services:
  - mqtt:want

# Persistent storage lives in /data automatically.
# Read-only access to the HA config dir lets us import devices straight from
# the official Tuya integration (reads .storage/core.config_entries only).
map:
  - homeassistant_config:ro
# Local Tuya control needs the add-on on the LAN: direct connections to the
# thermostats and UDP broadcast discovery (address "Auto") only work on the
# host network, not Docker's bridge network.
host_network: true

options:
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  discovery_prefix: homeassistant
  base_topic: wtm
  poll_interval: 30
  log_level: info
  extra_thermostat_categories: ""

schema:
  mqtt_host: str?
  mqtt_port: port?
  mqtt_username: str?
  mqtt_password: password?
  discovery_prefix: str
  base_topic: str
  poll_interval: int(5,3600)
  log_level: list(debug|info|warning|error)
  extra_thermostat_categories: str?
